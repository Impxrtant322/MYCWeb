          document.addEventListener('DOMContentLoaded', function() {
            (function(){
              const navOverlay = document.getElementById("nav-mobile-overlay")
              const openBtn = document.getElementById("nav-toggle-open")
              const closeBtn = document.getElementById("nav-toggle-close")
              const mobileLinks = document.querySelectorAll(".navigation-mobile-link")

              const openMenu = () => {
                navOverlay.classList.add("is-open")
                document.body.style.overflow = "hidden"
                openBtn.setAttribute("aria-expanded", "true")
              }

              const closeMenu = () => {
                navOverlay.classList.remove("is-open")
                document.body.style.overflow = ""
                openBtn.setAttribute("aria-expanded", "false")
              }

              openBtn.addEventListener("click", openMenu)
              closeBtn.addEventListener("click", closeMenu)

              mobileLinks.forEach((link) => {
                link.addEventListener("click", closeMenu)
              })

              document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && navOverlay.classList.contains("is-open")) {
                  closeMenu()
                }
              })
            })()
          });
